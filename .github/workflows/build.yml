name: Build Check

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/build-tools/35.0.0
          key: android-sdk-35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore secret, using defaults"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Start build timer
        id: build-start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --configure-on-demand \
            -x lintVitalRelease \
            -x test

      - name: Calculate build time
        if: always()
        run: |
          START=${{ steps.build-start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "Build completed in ${MINUTES}m ${SECONDS}s"

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build succeeded"
            APK_PATH=$(find app/build/outputs/apk/release/ -name '*.apk' -print -quit 2>/dev/null)
            if [ -n "$APK_PATH" ]; then
              APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || echo 0)
              echo "APK size: $((APK_BYTES / 1024))KB"
            fi
          else
            echo "❌ Build failed"
          fi
