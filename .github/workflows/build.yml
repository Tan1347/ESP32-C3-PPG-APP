name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/build-tools/35.0.0
          key: android-sdk-35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore secret, using defaults"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ========== Version (read only from build.gradle.kts) ==========
      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ -z "$VERSION" ]; then
            echo "❌ versionName is empty in build.gradle.kts"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION"

      - name: Start build timer
        id: build-start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --configure-on-demand \
            -x lintVitalRelease \
            -x test

      - name: Calculate build time
        if: always()
        run: |
          START=${{ steps.build-start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "Build completed in ${MINUTES}m ${SECONDS}s"

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build succeeded"
            APK_PATH=$(find app/build/outputs/apk/release/ -name '*.apk' -print -quit 2>/dev/null)
            if [ -n "$APK_PATH" ]; then
              APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || echo 0)
              echo "APK: $(basename $APK_PATH) ($((APK_BYTES / 1024))KB)"
            fi
          else
            echo "❌ Build failed"
          fi

      # ========== Generate release notes ==========
      - name: Generate release notes
        id: release-notes
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT_SHORT=$(git rev-parse --short HEAD)
          
          # Find previous release tag
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | grep -v "v${VERSION}" | head -1)
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" -10)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD -10)
          fi
          
          RELEASE_BODY="Version: v${VERSION} (${CURRENT_SHORT})"$'\n\n'"Changes:"$'\n'"${COMMITS}"
          
          RELEASE_LEN=$(echo "$RELEASE_BODY" | wc -c)
          if [ "$RELEASE_LEN" -gt 300 ]; then
            RELEASE_BODY=$(echo "$RELEASE_BODY" | head -c 297)
            RELEASE_BODY="${RELEASE_BODY}..."
          fi
          
          echo "$RELEASE_BODY" > /tmp/release_body.txt
          echo "📋 Release notes:"
          cat /tmp/release_body.txt

      # ========== Create release ==========
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/release_body.txt
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Cleanup old releases, tags, and workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗑️ Cleaning up old releases (keeping last 3)..."
          
          RELEASES=$(gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          
          COUNT=0
          for TAG in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "  Deleting release: $TAG"
              gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
            fi
          done
          
          echo "🗑️ Cleaning up old tags..."
          TAGS=$(git tag -l "v*" --sort=-creatordate | head -20)
          COUNT=0
          for TAG in $TAGS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "  Deleting tag: $TAG"
              git push origin --delete "$TAG" 2>/dev/null || true
              git tag -d "$TAG" 2>/dev/null || true
            fi
          done
          
          echo "🗑️ Cleaning up old workflow runs..."
          RUNS=$(gh run list --limit 100 --json databaseId,createdAt --jq 'sort_by(.createdAt) | reverse | .[].databaseId')
          COUNT=0
          CURRENT_RUN_ID="${{ github.run_id }}"
          for RUN_ID in $RUNS; do
            COUNT=$((COUNT + 1))
            if [ "$RUN_ID" = "$CURRENT_RUN_ID" ]; then
              echo "  Skipping current run: $RUN_ID"
              continue
            fi
            if [ $COUNT -gt 3 ]; then
              echo "  Deleting run: $RUN_ID"
              gh run delete "$RUN_ID" --yes 2>/dev/null || true
            fi
          done
          
          echo "✅ Cleanup complete"
