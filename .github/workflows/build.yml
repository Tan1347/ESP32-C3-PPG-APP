name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/build-tools/35.0.0
          key: android-sdk-35.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore secret, using defaults"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ========== Version management ==========
      - name: Calculate version
        id: version
        run: |
          # Read current version from build.gradle.kts
          GRADLE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "Gradle version: $GRADLE_VERSION"
          
          # Get the last released version from git tags (strip v prefix and commit hash)
          LAST_TAG=$(git tag -l "v*" --sort=-version:refname | head -1)
          LAST_RELEASED=$(echo "$LAST_TAG" | sed 's/^v//' | sed 's/-.*//')
          echo "Last released: ${LAST_RELEASED:-none}"
          
          # Parse versions using cut (sh-compatible)
          G_MAJOR=$(echo "$GRADLE_VERSION" | cut -d. -f1)
          G_MINOR=$(echo "$GRADLE_VERSION" | cut -d. -f2)
          G_PATCH=$(echo "$GRADLE_VERSION" | cut -d. -f3)
          
          if [ -n "$LAST_RELEASED" ] && echo "$LAST_RELEASED" | grep -q '^[0-9]'; then
            L_MAJOR=$(echo "$LAST_RELEASED" | cut -d. -f1)
            L_MINOR=$(echo "$LAST_RELEASED" | cut -d. -f2)
            L_PATCH=$(echo "$LAST_RELEASED" | cut -d. -f3)
          else
            L_MAJOR=0; L_MINOR=0; L_PATCH=0
          fi
          
          echo "Parsed: gradle=${G_MAJOR}.${G_MINOR}.${G_PATCH} last=${L_MAJOR}.${L_MINOR}.${L_PATCH}"
          
          # Decision logic
          if [ -z "$GRADLE_VERSION" ] || [ "$GRADLE_VERSION" = "" ]; then
            echo "❌ versionName is empty in build.gradle.kts"
            exit 1
          elif [ "$G_MAJOR" -gt "$L_MAJOR" ] 2>/dev/null || [ "$G_MINOR" -gt "$L_MINOR" ] 2>/dev/null; then
            NEW_VERSION="$GRADLE_VERSION"
            echo "📌 User bumped major/minor: $NEW_VERSION"
          elif [ "$G_PATCH" -gt "$L_PATCH" ] 2>/dev/null; then
            NEW_VERSION="$GRADLE_VERSION"
            echo "📌 User bumped patch: $NEW_VERSION"
          else
            NEW_PATCH=$((L_PATCH + 1))
            NEW_VERSION="${L_MAJOR}.${L_MINOR}.${NEW_PATCH}"
            echo "📌 Auto-incremented: $NEW_VERSION"
          fi
          
          # Save to outputs
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update build.gradle.kts with new version
          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          echo "✅ Updated build.gradle.kts to version $NEW_VERSION"
          
          # Show new version
          grep -n "versionName" app/build.gradle.kts

      - name: Start build timer
        id: build-start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --configure-on-demand \
            -x lintVitalRelease \
            -x test

      - name: Calculate build time
        if: always()
        run: |
          START=${{ steps.build-start.outputs.time }}
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "Build completed in ${MINUTES}m ${SECONDS}s"

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build succeeded"
            APK_PATH=$(find app/build/outputs/apk/release/ -name '*.apk' -print -quit 2>/dev/null)
            if [ -n "$APK_PATH" ]; then
              APK_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || echo 0)
              echo "APK: $(basename $APK_PATH) ($((APK_BYTES / 1024))KB)"
            fi
          else
            echo "❌ Build failed"
          fi

      # ========== Generate release notes ==========
      - name: Generate release notes
        id: release-notes
        if: success()
        run: |
          CURRENT_VERSION="${{ steps.version.outputs.new }}"
          CURRENT_SHORT=$(git rev-parse --short HEAD)
          
          # Find previous release tag
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | grep -v "v${CURRENT_VERSION}" | head -1)
          
          if [ -n "$PREV_TAG" ]; then
            echo "Previous release: $PREV_TAG"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" -10)
          else
            echo "No previous release found, getting last 10 commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD -10)
          fi
          
          # Build release body (limit to 300 chars)
          RELEASE_BODY="Version: v${CURRENT_VERSION} (${CURRENT_SHORT})"$'\n\n'"Changes:"$'\n'"${COMMITS}"
          
          if [ ${#RELEASE_BODY} -gt 300 ]; then
            RELEASE_BODY="${RELEASE_BODY:0:297}..."
          fi
          
          echo "$RELEASE_BODY" > /tmp/release_body.txt
          echo "📋 Release notes (${#RELEASE_BODY} chars):"
          cat /tmp/release_body.txt

      # ========== Commit version update ==========
      - name: Commit version update
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push origin master

      # ========== Delete old release ==========
      - name: Delete old release if tag exists
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          RELEASE_ID=$(gh release view "$TAG" --json id -q '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "🗑️ Deleting old release $TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      # ========== Create release ==========
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          body_path: /tmp/release_body.txt
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
